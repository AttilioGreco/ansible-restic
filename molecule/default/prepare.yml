---
- name: install base packages
  hosts: all
  gather_facts: false
  tasks:
    - name: molecule | prepare | bootstrap python3
      ansible.builtin.raw: |
        command -v python3 || dnf install -y python3
      changed_when: false

    - name: molecule | prepare | install epel
      ansible.builtin.package:
        name:
          - epel-release

    - name: molecule | prepare | install base packages
      ansible.builtin.package:
        name:
          - tar
          - unzip
          - bzip2
          - bzip2-libs
          - python3
          - nc
          - bind-utils
          - vim
          - net-tools
        state: present

    - name: molecule | prepare | create restic config directory
      ansible.builtin.file:
        path: /etc/restic
        state: directory
        mode: "0700"

    - name: molecule | prepare | create restic env file for testing
      ansible.builtin.copy:
        content: |
          RESTIC_REPOSITORY=/tmp/restic-repo
          RESTIC_PASSWORD=testpassword
          XDG_CACHE_HOME=/var/backups/restic_cache
        dest: /etc/restic/restic.env
        owner: root
        group: root
        mode: "0600"
