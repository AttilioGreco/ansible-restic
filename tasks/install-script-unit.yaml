- name: install script
  template:
    src: backup.sh.j2
    dest: "{{restic_script_path}}/backup-{{utility.lower()}}.sh"
    owner: root
    group: root
    mode: 0544

- name: check restic env file exists
  ansible.builtin.stat:
    path: "{{restic_backend_configurations_path}}"
  register: restic_env_file

- name: warn if restic env file is missing
  ansible.builtin.fail:
    msg: "EnvironmentFile {{ restic_backend_configurations_path }} not found. Deploy it manually or via vault before running this role."
  when: not restic_env_file.stat.exists

- name: create systemd service unit
  template:
    src: backup.service.j2
    dest: /etc/systemd/system/backup-{{utility.lower()}}.service
    owner: root
    group: root
    mode: 0644

- name: create systemd timer
  template:
    src: backup.timer.j2
    dest: /etc/systemd/system/backup-{{utility.lower()}}.timer
    owner: root
    group: root
    mode: 0644

- name: Start and Enable "backup-{{utility.lower()}}.timer"
  systemd:
    name: "backup-{{utility.lower()}}.timer"
    daemon_reload: yes
    enabled: yes
    state: started
